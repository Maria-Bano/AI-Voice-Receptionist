<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="800" viewBox="0 0 1200 800" role="img" aria-label="Architecture overview placeholder">
  <rect width="1200" height="800" fill="#0F172A"/>
  <text x="600" y="50" text-anchor="middle" fill="#F8FAFC" font-family="Segoe UI, system-ui, sans-serif" font-size="28" font-weight="700">System Architecture Overview</text>
  <!-- Guest -->
  <rect x="500" y="90" width="200" height="50" rx="8" fill="#334155" stroke="#64748B"/>
  <text x="600" y="122" text-anchor="middle" fill="#F1F5F9" font-family="Segoe UI, system-ui, sans-serif" font-size="16">Guest (Voice)</text>
  <line x1="600" y1="140" x2="600" y2="170" stroke="#64748B" stroke-width="2" marker-end="url(#arrow)"/>
  <!-- Vapi -->
  <rect x="480" y="170" width="240" height="50" rx="8" fill="#5B4FFF" opacity="0.85"/>
  <text x="600" y="202" text-anchor="middle" fill="#FFF" font-family="Segoe UI, system-ui, sans-serif" font-size="16" font-weight="600">Vapi Agent</text>
  <line x1="600" y1="220" x2="600" y2="250" stroke="#64748B" stroke-width="2"/>
  <!-- Tools -->
  <rect x="450" y="250" width="300" height="50" rx="8" fill="#FF6B35" opacity="0.85"/>
  <text x="600" y="282" text-anchor="middle" fill="#FFF" font-family="Segoe UI, system-ui, sans-serif" font-size="16" font-weight="600">MCP-Style Tools</text>
  <!-- Branches -->
  <line x1="600" y1="300" x2="600" y2="340" stroke="#64748B" stroke-width="2"/>
  <line x1="600" y1="340" x2="200" y2="380" stroke="#64748B" stroke-width="2"/>
  <line x1="600" y1="340" x2="600" y2="380" stroke="#64748B" stroke-width="2"/>
  <line x1="600" y1="340" x2="1000" y2="380" stroke="#64748B" stroke-width="2"/>
  <!-- RAG -->
  <rect x="80" y="380" width="240" height="70" rx="8" fill="#2D9CDB" opacity="0.85"/>
  <text x="200" y="415" text-anchor="middle" fill="#FFF" font-family="Segoe UI, system-ui, sans-serif" font-size="15" font-weight="600">RAG Pipeline</text>
  <text x="200" y="435" text-anchor="middle" fill="#E0F2FE" font-family="Segoe UI, system-ui, sans-serif" font-size="12">Policy &amp; FAQ</text>
  <!-- Availability -->
  <rect x="430" y="380" width="340" height="70" rx="8" fill="#00C896" opacity="0.85"/>
  <text x="600" y="415" text-anchor="middle" fill="#FFF" font-family="Segoe UI, system-ui, sans-serif" font-size="15" font-weight="600">Availability Engine</text>
  <text x="600" y="435" text-anchor="middle" fill="#D1FAE5" font-family="Segoe UI, system-ui, sans-serif" font-size="12">+ Google Sheets</text>
  <!-- n8n -->
  <rect x="880" y="380" width="240" height="70" rx="8" fill="#EA4B71" opacity="0.85"/>
  <text x="1000" y="415" text-anchor="middle" fill="#FFF" font-family="Segoe UI, system-ui, sans-serif" font-size="15" font-weight="600">n8n / API Workflows</text>
  <text x="1000" y="435" text-anchor="middle" fill="#FCE7F3" font-family="Segoe UI, system-ui, sans-serif" font-size="12">Bookings · CRM</text>
  <!-- Downstream -->
  <line x1="1000" y1="450" x2="1000" y2="500" stroke="#64748B" stroke-width="2"/>
  <rect x="880" y="500" width="240" height="50" rx="8" fill="#334155" stroke="#64748B"/>
  <text x="1000" y="532" text-anchor="middle" fill="#CBD5E1" font-family="Segoe UI, system-ui, sans-serif" font-size="14">Confirmations · CRM Updates</text>
  <text x="600" y="720" text-anchor="middle" fill="#64748B" font-family="Segoe UI, system-ui, sans-serif" font-size="14">Placeholder  replace with exported diagram from docs/architecture.md</text>
  <text x="600" y="750" text-anchor="middle" fill="#475569" font-family="Segoe UI, system-ui, sans-serif" font-size="13">Target: assets/architecture-overview.png (1200×800)</text>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <path d="M0,0 L9,3 L0,6 Z" fill="#64748B"/>
    </marker>
  </defs>
</svg>
